<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 280px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: #333;
        }

        .subtitle {
            color: #666;
            font-size: 12px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 15px 0;
        }

        #status {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            background: #e8f5e9;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h2>Cognitive Focus Assistant</h2>
    <div class="subtitle">Real-time focus & fatigue detection</div>

    <button id="session-btn" style="background:#4CAF50; color:white;">▶Start Session</button>

    <label>
        <input type="checkbox" id="deep">
        Deep Work Mode (harder interventions)
    </label>

    <div class="divider"></div>

    <button id="dashboard-btn" style="background:#2196F3; color:white;">
        Open Dashboard
    </button>

    <div id="status">Extension loaded. Click Start Session to begin.</div>

    <script src="popup.js"></script>
</body>

</html>
